version: '3.8'

services:
  # MongoDB - Raw news storage
  mongodb:
    image: mongo:7.0
    container_name: pippulse-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-pippulse}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-pippulse123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-pippulse}
    networks:
      - pippulse-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Stream queue and cache
  redis:
    image: redis:7.2-alpine
    container_name: pippulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - pippulse-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - Relational metadata
  postgres:
    image: postgres:16-alpine
    container_name: pippulse-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pippulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pippulse123}
      POSTGRES_DB: ${POSTGRES_DB:-pippulse}
    networks:
      - pippulse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pippulse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # InfluxDB - Time-series data
  influxdb:
    image: influxdb
    container_name: pippulse-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-pippulse}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-pippulse123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-pippulse}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-signals}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-pippulse-super-secret-token-change-in-production}
    networks:
      - pippulse-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pippulse-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - MONGODB_URI=mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@cluster0.wj77ll9.mongodb.net/?appName=Cluster0
      - REDIS_URI=redis://redis:6379/0
      - POSTGRES_URI=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}3@ls-d59e20cc1f9cd3f2a70d39a6ef9d424a750fbcb6.cmnmiowuqxsb.us-east-1.rds.amazonaws.com:5432/${POSTGRES_DB}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_SECRET=${TWITTER_ACCESS_SECRET}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-PipPulse/1.0}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - FINBERT_MODEL_NAME=ProsusAI/finbert
      - SIGNAL_LATENCY_TARGET=5
      - MAX_BATCH_SIZE=32
      - CONFIDENCE_THRESHOLD=0.6
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - pippulse-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pippulse-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - pippulse-network

  # Data Collector Service
  collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pippulse-collector
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - MONGODB_URI=mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@cluster0.wj77ll9.mongodb.net/?appName=Cluster0
      - REDIS_URI=redis://redis:6379/0
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_SECRET=${TWITTER_ACCESS_SECRET}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-PipPulse/1.0}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pippulse-network
    command: python -m app.collectors.main

  # Signal Generation Service
  signal-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pippulse-signal-engine
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - MONGODB_URI=mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@cluster0.wj77ll9.mongodb.net/?appName=Cluster0
      - REDIS_URI=redis://redis:6379/0
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - FINBERT_MODEL_NAME=ProsusAI/finbert
      - CONFIDENCE_THRESHOLD=0.6
      - TIME_DECAY_LAMBDA=0.1
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - pippulse-network
    command: python -m app.signal.main

networks:
  pippulse-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  postgres_data:
  influxdb_data:
  influxdb_config:
