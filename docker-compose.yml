services:
  # External services (MongoDB Atlas, PostgreSQL Lightsail) are configured via env vars
  # Local services only:

  redis:
    image: redis
    container_name: my-redis-db
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - pippulse-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:latest
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB:-pippulse}
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER:-admin}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD}
      - INFLUXDB_HTTP_AUTH_ENABLED=true
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - pippulse-network
    healthcheck:
      test: [ "CMD", "influx", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pippulse-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - MONGODB_URI=mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@cluster0.wj77ll9.mongodb.net/?appName=Cluster0
      - REDIS_URI=redis://redis:6379/0
      - POSTGRES_URI=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ls-d59e20cc1f9cd3f2a70d39a6ef9d424a750fbcb6.cmnmiowuqxsb.us-east-1.rds.amazonaws.com:5432/${POSTGRES_DB}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_SECRET=${TWITTER_ACCESS_SECRET}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-PipPulse/1.0}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - FINBERT_MODEL_NAME=ProsusAI/finbert
      - SIGNAL_LATENCY_TARGET=5
      - MAX_BATCH_SIZE=32
      - CONFIDENCE_THRESHOLD=0.6
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - pippulse-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
  

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pippulse-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - pippulse-network
    restart: unless-stopped

  # Data Collector Service
  collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pippulse-collector
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - MONGODB_URI=mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@cluster0.wj77ll9.mongodb.net/?appName=Cluster0
      - REDIS_URI=redis://redis:6379/0
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_SECRET=${TWITTER_ACCESS_SECRET}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-PipPulse/1.0}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - pippulse-network

  # Signal Generation Service
  signal-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pippulse-signal-engine
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - MONGODB_URI=mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@cluster0.wj77ll9.mongodb.net/?appName=Cluster0
      - REDIS_URI=redis://redis:6379/0
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - FINBERT_MODEL_NAME=ProsusAI/finbert
      - CONFIDENCE_THRESHOLD=0.6
      - TIME_DECAY_LAMBDA=0.1
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - pippulse-network
    restart: unless-stopped

volumes:
  redis-data:
  influxdb-data:

networks:
  pippulse-network:
    driver: bridge